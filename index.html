<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test1 — GitHub Pages Test</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
    }
    .card {
      background: var(--card);
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: var(--muted); line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: var(--accent);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Jamui Yuk 👋</h1>
    <p>This page is served by <strong>GitHub Pages</strong> from the <code>test1</code> repository.</p>
    <span class="badge">✅ Publish is working</span>
  </main>
</body>
</html>
