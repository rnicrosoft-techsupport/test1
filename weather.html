<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14-Day Forecast — Paris & Barcelona</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #273449;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --warm: #fb923c;
      --cool: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      padding: 2rem 1rem 3rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    h1 {
      margin: 0 0 0.25rem;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      background: linear-gradient(90deg, var(--accent), #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: var(--muted); margin: 0; font-size: 0.9rem; }
    .cities {
      display: grid;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      grid-template-columns: 1fr;
    }
    @media (min-width: 820px) { .cities { grid-template-columns: 1fr 1fr; } }
    .city {
      background: var(--card);
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .city h2 { margin: 0 0 1rem; font-size: 1.3rem; display: flex; align-items: center; gap: 0.5rem; }
    .days { display: flex; flex-direction: column; gap: 0.4rem; }
    .day {
      display: grid;
      grid-template-columns: 3.2rem 2rem 1fr auto;
      align-items: center;
      gap: 0.6rem;
      background: var(--card2);
      border-radius: 10px;
      padding: 0.55rem 0.75rem;
    }
    .day .date { font-size: 0.8rem; color: var(--muted); line-height: 1.2; }
    .day .date strong { display: block; color: var(--text); font-size: 0.9rem; }
    .day .icon { font-size: 1.4rem; text-align: center; }
    .day .desc { font-size: 0.8rem; color: var(--muted); }
    .day .rain { font-size: 0.72rem; color: var(--cool); }
    .day .temps { font-variant-numeric: tabular-nums; font-size: 0.9rem; white-space: nowrap; text-align: right; }
    .day .temps .hi { color: var(--warm); font-weight: 600; }
    .day .temps .lo { color: var(--muted); }
    .day .temps .f { display: block; font-size: 0.72rem; color: var(--muted); }
    .status { text-align: center; color: var(--muted); padding: 2rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 2rem; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>14-Day Weather Forecast</h1>
    <p>Paris &amp; Barcelona · live data from Open-Meteo</p>
  </header>

  <div id="app" class="cities">
    <div class="status">Loading forecast…</div>
  </div>

  <footer>
    Data by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo.com</a> ·
    <span id="updated">rolling next 14 days, auto-refreshes every 30 min</span>
  </footer>

  <script>
    const CITIES = [
      { name: "Paris", flag: "🇫🇷", lat: 48.8566, lon: 2.3522, tz: "Europe/Paris" },
      { name: "Barcelona", flag: "🇪🇸", lat: 41.3874, lon: 2.1686, tz: "Europe/Madrid" },
    ];

    // WMO weather code → { emoji, label }
    const WMO = {
      0: ["☀️", "Clear sky"],
      1: ["🌤️", "Mainly clear"],
      2: ["⛅", "Partly cloudy"],
      3: ["☁️", "Overcast"],
      45: ["🌫️", "Fog"], 48: ["🌫️", "Rime fog"],
      51: ["🌦️", "Light drizzle"], 53: ["🌦️", "Drizzle"], 55: ["🌦️", "Dense drizzle"],
      56: ["🌧️", "Freezing drizzle"], 57: ["🌧️", "Freezing drizzle"],
      61: ["🌦️", "Light rain"], 63: ["🌧️", "Rain"], 65: ["🌧️", "Heavy rain"],
      66: ["🌧️", "Freezing rain"], 67: ["🌧️", "Freezing rain"],
      71: ["🌨️", "Light snow"], 73: ["🌨️", "Snow"], 75: ["❄️", "Heavy snow"], 77: ["❄️", "Snow grains"],
      80: ["🌦️", "Rain showers"], 81: ["🌧️", "Rain showers"], 82: ["⛈️", "Violent showers"],
      85: ["🌨️", "Snow showers"], 86: ["🌨️", "Snow showers"],
      95: ["⛈️", "Thunderstorm"], 96: ["⛈️", "Thunderstorm + hail"], 99: ["⛈️", "Thunderstorm + hail"],
    };

    function fmtDate(iso) {
      const d = new Date(iso + "T00:00:00");
      const wd = d.toLocaleDateString("en-GB", { weekday: "short" });
      const md = d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
      return { wd, md };
    }

    async function loadCity(city) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}`
        + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
        + `&timezone=${encodeURIComponent(city.tz)}&forecast_days=14`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${city.name}: HTTP ${res.status}`);
      return res.json();
    }

    function renderCity(city, data) {
      const d = data.daily;
      const rows = d.time.map((iso, i) => {
        const [emoji, label] = WMO[d.weather_code[i]] || ["❓", "—"];
        const { wd, md } = fmtDate(iso);
        const hiC = Math.round(d.temperature_2m_max[i]);
        const loC = Math.round(d.temperature_2m_min[i]);
        const hiF = Math.round(d.temperature_2m_max[i] * 9 / 5 + 32);
        const loF = Math.round(d.temperature_2m_min[i] * 9 / 5 + 32);
        const rain = d.precipitation_probability_max[i];
        return `
          <div class="day">
            <div class="date"><strong>${wd}</strong>${md}</div>
            <div class="icon" title="${label}">${emoji}</div>
            <div>
              <div class="desc">${label}</div>
              <div class="rain">💧 ${rain == null ? "–" : rain + "%"}</div>
            </div>
            <div class="temps">
              <span><span class="hi">${hiC}°</span> / <span class="lo">${loC}°</span> C</span>
              <span class="f">${hiF}° / ${loF}° F</span>
            </div>
          </div>`;
      }).join("");
      return `
        <section class="city">
          <h2>${city.flag} ${city.name}</h2>
          <div class="days">${rows}</div>
        </section>`;
    }

    async function refresh() {
      const app = document.getElementById("app");
      try {
        const results = await Promise.all(CITIES.map(loadCity));
        app.innerHTML = CITIES.map((c, i) => renderCity(c, results[i])).join("");
        const now = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
        document.getElementById("updated").textContent =
          `rolling next 14 days · updated ${now}, auto-refreshes every 30 min`;
      } catch (err) {
        if (!app.querySelector(".city")) {
          app.innerHTML = `<div class="status">⚠️ Could not load forecast.<br>${err.message}</div>`;
        }
      }
    }

    refresh();
    // Re-fetch every 30 minutes so the window always tracks the next two weeks.
    setInterval(refresh, 30 * 60 * 1000);
    // Also refresh when the tab is brought back into focus after being hidden.
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") refresh();
    });
  </script>
</body>
</html>
